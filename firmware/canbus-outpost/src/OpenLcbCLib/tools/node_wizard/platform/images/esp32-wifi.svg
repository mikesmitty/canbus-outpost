<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- ESP32 module body -->
  <rect x="20" y="15" width="80" height="90" rx="4" fill="#303446" stroke="#8caaee" stroke-width="2.5"/>
  <!-- Metal shield -->
  <rect x="28" y="22" width="64" height="50" rx="3" fill="#414559" stroke="#626880" stroke-width="1.5"/>
  <!-- ESP32 label -->
  <text x="60" y="44" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c6d0f5">ESP32</text>
  <text x="60" y="58" text-anchor="middle" font-family="monospace" font-size="8" fill="#8caaee">WiFi</text>
  <!-- Antenna trace -->
  <path d="M55 15 L55 8 L65 8 L65 15" stroke="#e5c890" stroke-width="2" fill="none"/>
  <!-- Pins left -->
  <rect x="14" y="28" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="14" y="36" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="14" y="44" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="14" y="52" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="14" y="60" width="8" height="3" rx="1" fill="#a6d189"/>
  <!-- Pins right -->
  <rect x="98" y="28" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="36" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="44" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="52" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="60" width="8" height="3" rx="1" fill="#a6d189"/>
  <!-- WiFi waves -->
  <path d="M46 95 A20 20 0 0 1 74 95" stroke="#a6d189" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M50 91 A14 14 0 0 1 70 91" stroke="#a6d189" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M54 87 A8 8 0 0 1 66 87" stroke="#a6d189" stroke-width="2" fill="none" opacity="0.8"/>
  <circle cx="60" cy="97" r="3" fill="#a6d189"/>
</svg>
