  <rect x="98" y="28" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="36" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="44" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="52" width="8" height="3" rx="1" fill="#a6d189"/>
  <rect x="98" y="60" width="8" height="3" rx="1" fill="#a6d189"/>
  <!-- CAN symbol -->
  <path d="M38 82 C38 78 42 78 46 82 C50 86 54 86 54 82" stroke="#e78284" stroke-width="2" fill="none"/>
  <path d="M38 90 C38 86 42 86 46 90 C50 94 54 94 54 90" stroke="#e78284" stroke-width="2" fill="none"/>
  <text x="62" y="90" font-family="monospace" font-size="9" fill="#e78284">CAN</text>
