    const blob = new Blob([xml], { type: 'application/xml' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');

    a.href     = url;
    a.download = _loadedFilename && _loadedFilename !== '(Basic template)'
        ? _loadedFilename
        : 'cdi.xml';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

});


/* ---------- Layout (always horizontal: editor | CDI Tools) ---------------- */

/* ---------- Generic splitter drag factory --------------------------------- */

function initSplitterDrag(splitterEl, opts) {

    /*
     * opts.isVertical()  → bool  true = drag moves left/right (col-resize)
     * opts.getSize()     → px    current size of the pane being resized
     * opts.setSize(px)   → void  apply the new size
     * opts.min           → px    minimum size
     */

    let dragging = false;
    let startPos = 0;
    let startSize = 0;

    splitterEl.addEventListener('mousedown', e => {
        dragging  = true;
        splitterEl.classList.add('dragging');
        document.body.style.cursor     = opts.isVertical() ? 'col-resize' : 'row-resize';
        document.body.style.userSelect = 'none';
        startPos  = opts.isVertical() ? e.clientX : e.clientY;
        startSize = opts.getSize();
        e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
        if (!dragging) { return; }
        const pos   = opts.isVertical() ? e.clientX : e.clientY;
        const delta = (pos - startPos) * (opts.invert ? -1 : 1);
        opts.setSize(Math.max(opts.min, startSize + delta));
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) { return; }
        dragging = false;
        splitterEl.classList.remove('dragging');
        document.body.style.cursor     = '';
        document.body.style.userSelect = '';
        if (opts.onDragEnd) { opts.onDragEnd(opts.getSize()); }
    });
}

/* main splitter — resizes editor pane width */
initSplitterDrag(elSplitter, {
    isVertical: () => true,
    getSize:    () => elEditorPane.getBoundingClientRect().width,
    setSize:    px => {
        elEditorPane.style.width     = px + 'px';
        elEditorPane.style.flexBasis = px + 'px';
    },
    min: 100,
    onDragEnd: px => {
        localStorage.setItem('cdi_sp_main', px);
    }
});

/* validation splitter — resizes validation footer height (drag up = taller) */
initSplitterDrag(document.getElementById('val-splitter'), {
    isVertical: () => false,
    getSize:    () => elValFooter.getBoundingClientRect().height,
    setSize:    px => { elValFooter.style.height = px + 'px'; },
    min: 28,
    invert: true,
    onDragEnd: px => {
        localStorage.setItem('cdi_sp_val', px);
    }
});

function _restoreSplitterPositions() {

    const mainPx = parseFloat(localStorage.getItem('cdi_sp_main'));
    if (mainPx > 0) {
        elEditorPane.style.width     = mainPx + 'px';
        elEditorPane.style.flexBasis = mainPx + 'px';
    }

    const valPx = parseFloat(localStorage.getItem('cdi_sp_val'));
    if (valPx > 0) {
        elValFooter.style.height = valPx + 'px';
    }

}

/* ---------- Generate Basic XML ------------------------------------------- */

const BASIC_CDI_XML =
`<?xml version="1.0"?>
<cdi xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
     xsi:noNamespaceSchemaLocation="http://openlcb.org/schema/cdi/1/4/cdi.xsd">

  <identification>
    <manufacturer>Your Manufacturer Name</manufacturer>
    <model>Your Model Name</model>
    <hardwareVersion>1.0</hardwareVersion>
    <softwareVersion>1.0</softwareVersion>
  </identification>

  <!-- ACDI: declares Abbreviated CDI protocol support -->
  <acdi/>

  <!--
    Space 253 (0xFD) — Configuration Memory
    Bytes 0-127 are RESERVED by the default CDI:
      Byte   0-61  : User Node Name        (62-byte null-terminated string)
      Byte  62-124 : User Node Description (63-byte null-terminated string)

    Place your custom configuration at origin 128 or higher.
  -->
  <segment space="253" origin="0">
    <name>User Identification</name>
    <group>
      <name>User Identification</name>
      <description>User-assigned name and description for this node</description>
      <string size="62">
        <name>Node Name</name>
        <description>Short user-assigned name (max 62 characters)</description>
      </string>
      <string size="63">
        <name>Node Description</name>
        <description>Longer description of this node (max 63 characters)</description>
      </string>
    </group>
  </segment>

  <!-- Add your custom configuration here (origin >= 128 keeps reserved bytes intact) -->
  <segment space="253" origin="128">
    <name>Configuration</name>
    <group>
      <name>Configuration</name>
      <description>Node configuration settings</description>

      <!-- Example: integer field
      <int size="1">
        <name>My Setting</name>
        <description>A simple 1-byte configuration value</description>
        <min>0</min>
        <max>255</max>
        <default>0</default>
      </int>
      -->

      <!-- Example: Event ID
      <eventid>
        <name>My Event</name>
        <description>An event this node produces or consumes</description>
      </eventid>
      -->

    </group>
  </segment>

</cdi>`;

document.getElementById('btn-basic-xml').addEventListener('click', () => {

    if (elEditor.value.trim().length > 0) {
        if (!confirm('Replace the current content with a basic CDI template?')) { return; }
    }

    elEditor.value = BASIC_CDI_XML;
    _setFilename('(Basic template)');
    onEditorChange();
    render();
    elEditor.focus();
});

/* ---------- State persistence --------------------------------------------- */

var _cdiSaveTimer = null;
var _restoring    = false;   /* true during restore — suppresses saves */

function _saveCdiEditorState() {

    if (_restoring) { return; }
    clearTimeout(_cdiSaveTimer);
    _cdiSaveTimer = setTimeout(_saveCdiEditorStateNow, 500);

}

function _saveCdiEditorStateNow() {

    const state = {
        showAddr:      chkAddress.checked,
        mapView:       _mapView,
        xml:           elEditor.value,
        filename:      _loadedFilename || ''
    };
    localStorage.setItem('cdi_editor_state', JSON.stringify(state));

    /* Clean up orphaned keys from the old split-pane layout */
    localStorage.removeItem('cdi_sp_sub_beside');
    localStorage.removeItem('cdi_sp_sub_below');

}

function _restoreCdiEditorState() {

    const raw = localStorage.getItem('cdi_editor_state');
    if (!raw) { return; }

    _restoring = true;

    try {

        const state = JSON.parse(raw);
        if (typeof state.showAddr === 'boolean') { chkAddress.checked = state.showAddr; }
        /* Validate mapView against known views; fall back to 'flat' */
        var validViews = ['flat', 'tree', 'defines', 'struct', 'array', 'preview'];
        var restoredView = (state.mapView && validViews.indexOf(state.mapView) !== -1)
            ? state.mapView : 'flat';
        _setMapView(restoredView);

        if (state.xml) {
            elEditor.value = state.xml;
            if (state.filename) { _setFilename(state.filename); }
            onEditorChange();
        }

    } catch (e) { }

    _restoring = false;

}

/* Save state when address checkbox changes */
chkAddress.addEventListener('change', _saveCdiEditorState);

/* ---------- Init ---------------------------------------------------------- */
_restoreCdiEditorState();
_updateStatusBar();
_restoreSplitterPositions();

/* ---------- Embedded mode (iframe inside Node Wizard) --------------------- */

if (_isEmbedded) {

    /* Hide the header to save vertical space */
    const appHeader = document.querySelector('.app-header');
    if (appHeader) { appHeader.style.display = 'none'; }

    /* Listen for messages from the parent wizard */
    window.addEventListener('message', function (e) {

        if (!e.data) { return; }

        if (e.data.type === 'loadXml') {

            /* Only replace editor content if parent actually has XML to restore */
            if (e.data.xml && e.data.xml.trim().length > 0) {
                elEditor.value = e.data.xml;
                if (e.data.filename) { _setFilename(e.data.filename); }
                onEditorChange();
                render();
            }

        } else if (e.data.type === 'setPreserveWhitespace') {

            /* Restore checkbox state from parent */
            chkPreserveWs.checked = !!e.data.value;

        } else if (e.data.type === 'setConfigMemSize') {

            _configMemHighest = parseInt(e.data.value) || 0;

            /* Re-render stats and warnings with updated config memory size */
            const xml = elEditor.value.trim();
            if (xml) {
                const mapData = CdiRenderer.buildMap(xml);
                if (mapData) {
                    _renderMapStats(mapData, document.getElementById('map-stats-bar'));
                    _renderConfigMemWarning(mapData, document.getElementById('map-config-warning'));
                }
            }

        }

    });

    /* Notify parent that we are ready */
    window.parent.postMessage({ type: 'ready', view: 'cdi' }, '*');

    /* If editor already has content, notify parent */
    if (elEditor.value.trim().length > 0) {
        _postXmlToParent();
    }

}
